<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0b0a14" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="manifest" href="manifest.json" />
<title>MoveLab — Joint Tracker</title>
<style>
  :root{
    --bg:#0b0a14; --panel:rgba(18,14,32,.82); --line:#2a2440;
    --txt:#eef0ff; --muted:#9aa0c0; --cyan:#00dcff; --green:#39ff14;
    --orange:#ffa500; --red:#ff3250; --purple:#dc32c8;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--txt);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;overscroll-behavior:none}
  #stage{position:fixed;inset:0;background:#000}
  video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  #overlay{position:absolute;inset:0;width:100%;height:100%}

  #topbar{position:fixed;top:0;left:0;right:0;display:flex;gap:6px;flex-wrap:wrap;
    padding:max(8px,env(safe-area-inset-top)) 10px 8px;align-items:center;
    background:linear-gradient(#000a,transparent);z-index:5;font-size:12px}
  .chip{background:var(--panel);border:1px solid var(--line);border-radius:20px;
    padding:5px 10px;display:flex;gap:6px;align-items:center;backdrop-filter:blur(6px)}
  .dot{width:8px;height:8px;border-radius:50%}
  #recDot{background:var(--red);animation:blink 1s infinite;display:none}
  @keyframes blink{50%{opacity:.2}}

  #controls{position:fixed;left:0;right:0;bottom:0;z-index:6;
    padding:10px 10px max(10px,env(safe-area-inset-bottom));
    display:flex;gap:8px;justify-content:center;flex-wrap:wrap;
    background:linear-gradient(transparent,#000c)}
  button{background:var(--panel);color:var(--txt);border:1px solid var(--line);
    border-radius:14px;padding:11px 14px;font-size:13px;font-weight:600;
    display:flex;gap:6px;align-items:center;min-width:64px;justify-content:center}
  button:active{transform:scale(.95)}
  button.primary{background:var(--cyan);color:#001018;border-color:transparent}
  button.rec{background:var(--red);color:#fff;border-color:transparent}
  button:disabled{opacity:.4}

  #splash{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:24px;gap:14px;
    background:radial-gradient(circle at 50% 30%,#1a1432,#070611)}
  #splash h1{margin:0;font-size:26px;background:linear-gradient(90deg,var(--cyan),var(--purple));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  #splash p{color:var(--muted);max-width:340px;line-height:1.5;font-size:14px;margin:0}
  #splash .big{font-size:16px;padding:16px 26px}
  #loadmsg{color:var(--cyan);font-size:13px;min-height:18px;max-width:340px}
  .spinner{width:34px;height:34px;border:3px solid #ffffff20;border-top-color:var(--cyan);
    border-radius:50%;animation:spin 1s linear infinite;display:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  #report{position:fixed;inset:0;z-index:30;background:#070611;display:none;
    flex-direction:column;padding:max(14px,env(safe-area-inset-top)) 14px 14px}
  #report header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  #report h2{margin:0;font-size:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px}
  .card h4{margin:0 0 6px;font-size:14px;color:var(--cyan)}
  .card p{margin:4px 0;font-size:13px;color:var(--muted)}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:40;
    background:#000d;border:1px solid var(--line);border-radius:20px;padding:8px 16px;
    font-size:13px;opacity:0;transition:opacity .3s;text-align:center;max-width:90vw}
</style>
</head>
<body>

<div id="stage">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="topbar">
  <div class="chip"><span class="dot" id="poseDot" style="background:var(--red)"></span><span id="poseTxt">No pose</span></div>
  <div class="chip"><span id="viewTxt">View: —</span></div>
  <div class="chip"><span id="fpsTxt">— fps</span></div>
  <div class="chip"><span id="diagTxt">—</span></div>
  <div class="chip"><span class="dot" id="recDot"></span><span id="recTxt" style="display:none">REC</span></div>
</div>

<div id="controls">
  <button id="btnFlip">🔄 Flip</button>
  <button id="btnLabels" class="primary">🏷 Labels</button>
  <button id="btnCam">📷 Rear</button>
  <button id="btnRec" class="rec">⏺ Record</button>
  <button id="btnReset">↺ Reset</button>
</div>

<div id="splash">
  <h1>MoveLab</h1>
  <p>Full-body <b>joint tracking</b> for games &amp; physio rehab.
     Works in frontal and side views. Joint-angle measurement comes next,
     once tracking is solid.</p>
  <button id="btnStart" class="primary big">▶ Start Camera</button>
  <div class="spinner" id="spin"></div>
  <div id="loadmsg"></div>
  <p style="font-size:12px">Stand 2–3 m back so your <b>whole body</b> is in frame.
     Allow the camera permission when asked.</p>
</div>

<div id="report">
  <header>
    <h2>Recorded Session</h2>
    <div style="display:flex;gap:8px">
      <button id="btnCsv">⬇ CSV</button>
      <button id="btnJson">⬇ JSON</button>
      <button id="btnClose">✕</button>
    </div>
  </header>
  <div id="reportBody"></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { FilesetResolver, PoseLandmarker }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12";

// ───────────────────────── Config ─────────────────────────
const CONNECTIONS = PoseLandmarker.POSE_CONNECTIONS;
const POSE_MODEL  = "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/1/pose_landmarker_full.task";
const WASM        = "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm";

// 33 BlazePose landmark names (used for CSV/JSON export)
const NAMES = ["nose","left_eye_inner","left_eye","left_eye_outer","right_eye_inner",
 "right_eye","right_eye_outer","left_ear","right_ear","mouth_left","mouth_right",
 "left_shoulder","right_shoulder","left_elbow","right_elbow","left_wrist","right_wrist",
 "left_pinky","right_pinky","left_index","right_index","left_thumb","right_thumb",
 "left_hip","right_hip","left_knee","right_knee","left_ankle","right_ankle",
 "left_heel","right_heel","left_foot_index","right_foot_index"];

// Body-part names drawn ON the body next to the major joints
const LABELS = {
  0:"Head",
  11:"L.Shoulder", 12:"R.Shoulder",
  13:"L.Elbow",    14:"R.Elbow",
  15:"L.Wrist",    16:"R.Wrist",
  23:"L.Hip",      24:"R.Hip",
  25:"L.Knee",     26:"R.Knee",
  27:"L.Ankle",    28:"R.Ankle",
  31:"L.Foot",     32:"R.Foot"
};

const P = {L_SH:11,R_SH:12,L_HIP:23,R_HIP:24};
const VIS_DRAW = 0.3, VIS_HI = 0.7;     // confidence gates for drawing

// ──────────────────── One-Euro filter ─────────────────────
// Smooths each landmark's position so the skeleton sits steady instead of
// shaking frame-to-frame, while staying responsive when you actually move.
class OneEuro{
  constructor(min=1.2,beta=0.25,d=1.0){this.min=min;this.beta=beta;this.d=d;
    this.x=null;this.dx=0;this.t=null;this.freq=30;}
  alpha(c){const te=1/this.freq,tau=1/(2*Math.PI*c);return 1/(1+tau/te);}
  filt(x,t){
    if(this.x===null){this.x=x;this.t=t;return x;}
    if(t>this.t)this.freq=1/(t-this.t); this.t=t;
    const dx=(x-this.x)*this.freq, ad=this.alpha(this.d);
    const dxh=ad*dx+(1-ad)*this.dx;
    const cut=this.min+this.beta*Math.abs(dxh), a=this.alpha(cut);
    const xh=a*x+(1-a)*this.x; this.x=xh; this.dx=dxh; return xh;
  }
}

function vis(p){ return (p && p.visibility!=null) ? p.visibility : 1; }

// View detection from shoulder-vs-hip width — tells frontal / side / angled.
function detectView(lm){
  const ls=lm[P.L_SH],rs=lm[P.R_SH];
  if(vis(ls)<.4||vis(rs)<.4)return["—","#9aa0c0"];
  const sdx=Math.abs(rs.x-ls.x);
  const lh=lm[P.L_HIP],rh=lm[P.R_HIP];
  const hdx=(vis(lh)>.3&&vis(rh)>.3)?Math.abs(rh.x-lh.x):.18;
  const r=sdx/Math.max(hdx,.04);
  if(r<.30)return["SIDE","#ffa500"];
  if(r>.80)return["FRONTAL","#39ff14"];
  return["ANGLED","#00dcff"];
}

// ─────────────────────── DOM / state ──────────────────────
const video=document.getElementById("video"),
      canvas=document.getElementById("overlay"), ctx=canvas.getContext("2d");
const $=id=>document.getElementById(id);
let landmarker=null, stream=null, facing="environment", mirror=false, delegate="GPU";
let running=false, lastT=performance.now(), fps=0, lastVideoTime=-1, lastRes=null;
let showLabels=true;
let cover={scale:1,ox:0,oy:0};
let lastStat=0, diagStr="—", viewStr="View: —", viewCol="#9aa0c0";
const HUD_MS=1000;
// per-landmark position smoothers (x,y)
const fX=[], fY=[];
for(let i=0;i<33;i++){fX[i]=new OneEuro();fY[i]=new OneEuro();}
// recording of joint positions
let recording=false, session=[], sessionStart=0;

function toast(m){const t=$("toast");t.textContent=m;t.style.opacity=1;
  clearTimeout(t._h);t._h=setTimeout(()=>t.style.opacity=0,2200);}

// ─────────────────────── Setup ────────────────────────────
async function loadModel(){
  $("loadmsg").textContent="Loading tracking model… (first time ~10 MB)";
  const vision=await FilesetResolver.forVisionTasks(WASM);
  const opts=(del)=>({
    baseOptions:{modelAssetPath:POSE_MODEL, delegate:del},
    runningMode:"VIDEO", numPoses:1,
    minPoseDetectionConfidence:.5, minPosePresenceConfidence:.5, minTrackingConfidence:.5
  });
  try{ landmarker=await PoseLandmarker.createFromOptions(vision,opts("GPU")); delegate="GPU"; }
  catch(e){
    $("loadmsg").textContent="GPU unavailable, using CPU…";
    landmarker=await PoseLandmarker.createFromOptions(vision,opts("CPU")); delegate="CPU";
  }
}

function applyMirror(){ video.style.transform = mirror ? "scaleX(-1)" : "none"; }

async function startCamera(){
  if(stream)stream.getTracks().forEach(t=>t.stop());
  mirror = (facing==="user"); applyMirror();
  let s;
  try{
    s=await navigator.mediaDevices.getUserMedia({audio:false,
      video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}}});
  }catch(e){ s=await navigator.mediaDevices.getUserMedia({audio:false,video:true}); }
  stream=s; video.srcObject=s;
  await new Promise(r=>{ if(video.readyState>=1)r(); else video.onloadedmetadata=()=>r(); });
  await video.play();
  resize();
}

function resize(){
  canvas.width=canvas.clientWidth; canvas.height=canvas.clientHeight; computeCover();
}
function computeCover(){
  const vw=video.videoWidth, vh=video.videoHeight;
  if(!vw||!vh){cover={scale:1,ox:0,oy:0};return;}
  const s=Math.max(canvas.width/vw, canvas.height/vh); // object-fit: cover
  cover={scale:s, ox:(canvas.width-vw*s)/2, oy:(canvas.height-vh*s)/2, vw, vh};
}
window.addEventListener("resize",resize);
window.addEventListener("orientationchange",()=>setTimeout(resize,300));

// normalized (sx,sy) -> overlay pixel, matching cover-cropped + mirrored video
function px(sx,sy){
  if(!cover.vw)computeCover();
  const nx = mirror ? (1-sx) : sx;
  return [cover.ox + nx*cover.vw*cover.scale, cover.oy + sy*cover.vh*cover.scale];
}

// ─────────────────────── Render loop ──────────────────────
function loop(){
  if(!running)return;
  const now=performance.now();
  if(landmarker && video.readyState>=2){
    if(!canvas.width || canvas.width!==canvas.clientWidth) resize();
    if(video.currentTime!==lastVideoTime){
      lastVideoTime=video.currentTime;
      try{ lastRes=landmarker.detectForVideo(video,now); }catch(e){}
    }
    fps=fps*0.9 + (1000/Math.max(now-lastT,1))*0.1; lastT=now;
    draw(lastRes,now);
  }
  requestAnimationFrame(loop);
}

function draw(res,now){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const have = res && res.landmarks && res.landmarks.length>0;
  $("poseDot").style.background = have ? "var(--green)":"var(--red)";
  $("poseTxt").textContent = have ? "Pose OK":"No pose";

  if(have){
    const raw=res.landmarks[0];
    // smooth positions for a steady skeleton
    const t=now/1000;
    const sm=raw.map((p,i)=>({x:fX[i].filt(p.x,t), y:fY[i].filt(p.y,t),
                              z:p.z, visibility:vis(p)}));
    const nVis=sm.filter(p=>p.visibility>=VIS_DRAW).length;
    diagStr=delegate+" · "+nVis+"/33 joints";
    const [vl,vc]=detectView(sm); viewStr="View: "+vl; viewCol=vc;

    // skeleton bones
    ctx.lineWidth=4; ctx.lineCap="round"; ctx.strokeStyle="#00dcffdd";
    for(const c of CONNECTIONS){
      const a=sm[c.start],b=sm[c.end];
      if(a.visibility<VIS_DRAW||b.visibility<VIS_DRAW)continue;
      const pa=px(a.x,a.y),pb=px(b.x,b.y);
      ctx.beginPath();ctx.moveTo(pa[0],pa[1]);ctx.lineTo(pb[0],pb[1]);ctx.stroke();
    }
    // joints + labels
    for(let i=0;i<sm.length;i++){
      const v=sm[i].visibility; if(v<VIS_DRAW)continue;
      const [x,y]=px(sm[i].x,sm[i].y);
      ctx.beginPath();ctx.arc(x,y,v>=VIS_HI?6:4,0,7);
      ctx.fillStyle=v>=VIS_HI?"#39ff14":v>=0.5?"#ffa500":"#ff3250";ctx.fill();
      ctx.lineWidth=1.5;ctx.strokeStyle="#0b0a14";ctx.stroke();
      if(showLabels && LABELS[i] && v>=0.5) drawLabel(x,y,LABELS[i]);
    }
    if(recording){
      session.push({t:(now-sessionStart)/1000,
        pts:sm.map(p=>[+p.x.toFixed(4),+p.y.toFixed(4),+p.z.toFixed(4),+p.visibility.toFixed(3)])});
    }
  }else{
    viewStr="View: —"; viewCol="#9aa0c0"; diagStr=delegate+" · 0/33 joints";
    drawCenter("No person detected  —  step into frame","#ffa500");
  }

  // throttle flickery text so it reads steady when you hold still
  if(now-lastStat>=HUD_MS){
    lastStat=now;
    $("fpsTxt").textContent=Math.round(fps)+" fps";
    $("diagTxt").textContent=diagStr;
    $("viewTxt").textContent=viewStr; $("viewTxt").style.color=viewCol;
  }
}

function drawLabel(x,y,text){
  ctx.font="bold 12px sans-serif";ctx.textAlign="left";ctx.textBaseline="middle";
  const w=ctx.measureText(text).width;
  let lx=x+9, ly=y-2;
  if(lx+w+8>canvas.width) lx=x-w-17;
  ly=Math.max(11,Math.min(canvas.height-11,ly));
  ctx.fillStyle="#000b";ctx.fillRect(lx-3,ly-9,w+8,18);
  ctx.fillStyle="#ffffff";ctx.fillText(text,lx+1,ly);
}
function drawCenter(text,col){
  ctx.font="bold 16px sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";
  const w=ctx.measureText(text).width;
  ctx.fillStyle="#000a";ctx.fillRect(canvas.width/2-w/2-10,canvas.height/2-16,w+20,32);
  ctx.fillStyle=col;ctx.fillText(text,canvas.width/2,canvas.height/2);
}

// ─────────────────── Recording / export ───────────────────
function setRec(on){
  recording=on;
  $("recDot").style.display=on?"block":"none";
  $("recTxt").style.display=on?"inline":"none";
  $("btnRec").innerHTML=on?"⏹ Stop":"⏺ Record";
  $("btnRec").classList.toggle("primary",on);
  if(on){session=[];sessionStart=performance.now();toast("Recording joint motion…");}
  else{ openReport(); }
}
function openReport(){
  const dur = session.length ? session[session.length-1].t : 0;
  $("reportBody").innerHTML = session.length
    ? `<div class="card"><h4>Joint motion captured</h4>
        <p>Frames: <b style="color:var(--txt)">${session.length}</b></p>
        <p>Duration: <b style="color:var(--txt)">${dur.toFixed(1)} s</b></p>
        <p>Each frame stores all 33 joint positions (x, y, z, visibility).</p>
        <p>Export as CSV or JSON above for analysis. Joint-angle measurement
           will be added once tracking is validated in both views.</p></div>`
    : `<div class="card"><p>No frames recorded.</p></div>`;
  $("report").style.display="flex";
}
function exportCSV(){
  let head=["time_s"]; NAMES.forEach(n=>head.push(n+"_x",n+"_y",n+"_z",n+"_v"));
  const lines=[head.join(",")];
  for(const f of session){
    const row=[f.t.toFixed(3)];
    for(const p of f.pts) row.push(p[0],p[1],p[2],p[3]);
    lines.push(row.join(","));
  }
  download("movelab_joints_"+Date.now()+".csv","text/csv",lines.join("\n"));
}
function exportJSON(){
  download("movelab_joints_"+Date.now()+".json","application/json",
    JSON.stringify({recordedAt:new Date().toISOString(),landmarkNames:NAMES,
                    frames:session.length, samples:session},null,1));
}
function download(name,type,data){
  const b=new Blob([data],{type}); const u=URL.createObjectURL(b);
  const a=document.createElement("a"); a.href=u; a.download=name; a.click();
  setTimeout(()=>URL.revokeObjectURL(u),1000); toast("Downloaded "+name);
}

// ─────────────────────── Controls ─────────────────────────
$("btnStart").onclick=async()=>{
  $("btnStart").style.display="none"; $("spin").style.display="block";
  try{
    if(!landmarker)await loadModel();
    $("loadmsg").textContent="Starting camera…";
    await startCamera();
    $("splash").style.display="none";
    running=true; loop();
  }catch(e){
    $("spin").style.display="none"; $("btnStart").style.display="block";
    $("loadmsg").textContent="Error: "+(e.message||e);
  }
};
$("btnCam").onclick=async()=>{
  facing = facing==="environment"?"user":"environment";
  $("btnCam").textContent = facing==="environment"?"📷 Rear":"🤳 Front";
  if(running){try{await startCamera();}catch(e){toast("Cam switch failed");}}
};
$("btnFlip").onclick=()=>{mirror=!mirror;applyMirror();toast("Mirror "+(mirror?"on":"off"));};
$("btnLabels").onclick=()=>{showLabels=!showLabels;
  $("btnLabels").classList.toggle("primary",showLabels);
  toast("Joint labels "+(showLabels?"on":"off"));};
$("btnRec").onclick=()=>setRec(!recording);
$("btnReset").onclick=()=>{session=[];toast("Cleared");};
$("btnCsv").onclick=exportCSV;
$("btnJson").onclick=exportJSON;
$("btnClose").onclick=()=>$("report").style.display="none";

if(!window.isSecureContext && location.hostname!=="localhost"){
  $("loadmsg").textContent="⚠ Open over HTTPS (e.g. GitHub Pages) for camera access.";
}
</script>
</body>
</html>
